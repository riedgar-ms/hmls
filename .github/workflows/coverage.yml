name: Coverage

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC

permissions:
  contents: read

jobs:
  per-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        package:
          - hmls-client
          - hmls-core
          - hmls-mapgenerator
          - hmls-networking
          - computerplayers/hmls-nncore
          - hmls-observer
          - hmls-protocol
          - computerplayers/singletank/hmls-randomtank
          - computerplayers/singletank/hmls-reinforcetrainer
          - hmls-replayviewer
          - hmls-server
          - computerplayers/simplesquad/hmls-simplesquadexecutor
          - computerplayers/simplesquad/hmls-simplesquadplanner
          - computerplayers/simplesquad/hmls-simplesquadplayer
          - computerplayers/simplesquad/hmls-simplesquadtrainer
          - computerplayers/singletank/hmls-singlemki
          - computerplayers/singletank/hmls-singlemkii
          - computerplayers/singletank/hmls-singlemkiii
          - hmls-testharness
          - hmls-uxcommon
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Compute package slug
        id: slug
        run: echo "value=$(echo '${{ matrix.package }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Run tests with coverage
        run: |
          uv run pytest "packages/${{ matrix.package }}/tests/" \
            --cov="packages/${{ matrix.package }}/src" \
            --cov-report=term-missing \
            --cov-report="xml:coverage-${{ steps.slug.outputs.value }}.xml"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ steps.slug.outputs.value }}
          path: coverage-${{ steps.slug.outputs.value }}.xml

  combined:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run all tests with coverage
        run: |
          uv run pytest \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml:coverage-all.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-all
          path: coverage-all.xml
