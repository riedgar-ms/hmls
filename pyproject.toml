[project]
name = "hmls-workspace"
version = "0.0.0"
description = "Tank game AI experiments workspace"
requires-python = ">=3.14"

[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.4",
    "mypy>=1.10",
]

[tool.ruff]
src = ["packages/*/src"]
line-length = 100
target-version = "py314"

[tool.ruff.lint]
extend-select = ["I"]

[tool.mypy]
packages = ["hmls"]
mypy_path = "packages/hmls-core/src"
plugins = ["pydantic.mypy"]
strict = true
explicit_package_bases = true
python_version = "3.14"

[tool.pytest.ini_options]
testpaths = ["packages/hmls-core/tests"]
