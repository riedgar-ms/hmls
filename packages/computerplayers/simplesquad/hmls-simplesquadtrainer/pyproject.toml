[project]
name = "hmls-simplesquadtrainer"
version = "0.1.0"
description = "REINFORCE trainer for simple squad (planner + executor) architecture"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "hmls-nncore",
    "hmls-simplesquadplayer",
    "hmls-simplesquadplanner",
    "hmls-simplesquadexecutor",
    "hmls-mapgenerator",
    "pydantic>=2.0",
    "torch>=2.0",
]

[tool.uv.sources]
hmls-core = { workspace = true }
hmls-nncore = { workspace = true }
hmls-simplesquadplayer = { workspace = true }
hmls-simplesquadplanner = { workspace = true }
hmls-simplesquadexecutor = { workspace = true }
hmls-mapgenerator = { workspace = true }

[project.scripts]
hmls-simplesquadtrainer = "hmls.simplesquadtrainer.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
