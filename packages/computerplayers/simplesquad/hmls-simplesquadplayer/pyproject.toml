[project]
name = "hmls-simplesquadplayer"
version = "0.1.0"
description = "Composite squad player combining planner and executor models"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "hmls-nncore",
    "hmls-simplesquadexecutor",
    "hmls-simplesquadplanner",
    "pydantic>=2.0",
    "torch>=2.0",
]

[project.entry-points."hmls.squads"]
simplesquad = "hmls.simplesquadplayer.persistence:PERSISTENCE"

[tool.uv.sources]
hmls-core = { workspace = true }
hmls-nncore = { workspace = true }
hmls-simplesquadexecutor = { workspace = true }
hmls-simplesquadplanner = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
