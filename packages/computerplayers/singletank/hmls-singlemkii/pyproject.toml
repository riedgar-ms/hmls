[project]
name = "hmls-singlemkii"
version = "0.1.0"
description = "Mk-II neural network player for HMLS tank game (dual stacked GRU)"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "hmls-nncore",
    "pydantic>=2.0",
    "torch>=2.0",
]

[project.entry-points."hmls.models"]
singlemkii = "hmls.singlemkii.persistence:PERSISTENCE"

[tool.uv.sources]
hmls-core = { workspace = true }
hmls-nncore = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
