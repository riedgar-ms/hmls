[project]
name = "hmls-nncore"
version = "0.1.0"
description = "Common neural network utilities for HMLS tank game players"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "numpy>=2.0",
    "pydantic>=2.0",
    "torch>=2.0",
]

[tool.uv.sources]
hmls-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
