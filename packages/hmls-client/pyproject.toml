[project]
name = "hmls-client"
version = "0.1.0"
description = "WebSocket game client for the HMLS tank game"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "hmls-protocol",
    "textual>=0.40",
    "websockets>=13",
]

[tool.uv.sources]
hmls-core = { workspace = true }
hmls-protocol = { workspace = true }

[project.scripts]
hmls-client = "hmls.client.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
