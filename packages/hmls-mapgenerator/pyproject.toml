[project]
name = "hmls-mapgenerator"
version = "0.1.0"
description = "Randomised game map generator with Textual TUI"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "pydantic>=2.0",
    "textual>=0.40",
]

[tool.uv.sources]
hmls-core = { workspace = true }

[project.scripts]
hmls-mapgenerator = "hmls.mapgenerator.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
