[project]
name = "hmls-server"
version = "0.1.0"
description = "WebSocket game server for the HMLS tank game"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "hmls-protocol",
    "hmls-uxcommon",
    "textual>=0.40",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
]

[tool.uv.sources]
hmls-core = { workspace = true }
hmls-protocol = { workspace = true }
hmls-uxcommon = { workspace = true }

[project.scripts]
hmls-server = "hmls.server.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
