[project]
name = "hmls-singletanknn"
version = "0.1.0"
description = "Neural network player for HMLS tank game (single tank)"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "torch>=2.0",
]

[tool.uv.sources]
hmls-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
