[project]
name = "hmls-uxcommon"
version = "0.1.0"
description = "Shared TUI widgets and styles for HMLS tank game applications"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "textual>=0.40",
]

[tool.uv.sources]
hmls-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
