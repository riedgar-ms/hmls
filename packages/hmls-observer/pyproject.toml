[project]
name = "hmls-observer"
version = "0.1.0"
description = "TUI observer client for the HMLS tank game server"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "hmls-networking",
    "hmls-protocol",
    "hmls-uxcommon",
    "textual>=0.40",
    "websockets>=13",
]

[tool.uv.sources]
hmls-core = { workspace = true }
hmls-networking = { workspace = true }
hmls-protocol = { workspace = true }
hmls-uxcommon = { workspace = true }

[project.scripts]
hmls-observer = "hmls.observer.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
