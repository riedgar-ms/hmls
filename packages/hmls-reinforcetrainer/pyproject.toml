[project]
name = "hmls-reinforcetrainer"
version = "0.1.0"
description = "REINFORCE policy gradient trainer for HMLS tank models"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "hmls-nncore",
    "hmls-mapgenerator",
    "pydantic>=2.0",
    "torch>=2.0",
]

[tool.uv.sources]
hmls-core = { workspace = true }
hmls-nncore = { workspace = true }
hmls-mapgenerator = { workspace = true }

[project.scripts]
hmls-reinforcetrainer = "hmls.reinforcetrainer.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
