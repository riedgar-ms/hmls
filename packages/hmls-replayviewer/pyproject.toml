[project]
name = "hmls-replayviewer"
version = "0.1.0"
description = "TUI replay viewer for HMLS tank game history files"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "hmls-uxcommon",
    "textual>=0.40",
]

[tool.uv.sources]
hmls-core = { workspace = true }
hmls-uxcommon = { workspace = true }

[project.scripts]
hmls-replay = "hmls.replayviewer.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
