[project]
name = "hmls-testharness"
version = "0.1.0"
description = "Interactive TUI test harness for the HMLS tank game"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "textual>=0.40",
]

[tool.uv.sources]
hmls-core = { workspace = true }

[project.scripts]
hmls-testharness = "hmls.testharness.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
