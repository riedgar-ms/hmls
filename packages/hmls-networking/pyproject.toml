[project]
name = "hmls-networking"
version = "0.1.0"
description = "Shared WebSocket client session for HMLS game applications"
requires-python = ">=3.14"
dependencies = [
    "hmls-protocol",
    "websockets>=13",
]

[tool.uv.sources]
hmls-protocol = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
