[project]
name = "hmls-protocol"
version = "0.1.0"
description = "Wire protocol models for HMLS tank game server/client communication"
requires-python = ">=3.14"
dependencies = [
    "hmls-core",
    "pydantic>=2",
]

[tool.uv.sources]
hmls-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hmls"]
